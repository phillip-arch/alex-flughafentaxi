name: Hourly booking reminders

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

concurrency:
  group: hourly-booking-reminders
  cancel-in-progress: false

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call reminder endpoint
        env:
          REMINDER_BASE_URL: ${{ vars.REMINDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${REMINDER_BASE_URL:-}" ]; then
            echo "::error::Missing repository variable REMINDER_BASE_URL"
            exit 1
          fi

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Missing repository secret CRON_SECRET"
            exit 1
          fi

          base_url="${REMINDER_BASE_URL%/}"

          curl \
            --fail-with-body \
            --show-error \
            --silent \
            --retry 3 \
            --retry-delay 10 \
            --connect-timeout 15 \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/reminders"
